services:
  - type: web
    name: pdf-agent-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: PDF_REGISTRY_PATH
        value: ./pdf_registry.json
      # Set to your Vercel frontend URL to restrict CORS in production
      # e.g. https://your-app.vercel.app
      - key: ALLOWED_ORIGINS
        value: "*"
    healthCheckPath: /health
